r accuracy.\nIf your shipment is moving, the last scanned hub will be shown.\nShould there be a data delay, I will report it to you honestly.\n\nOnce verified, I can show you the location information immediately.\nI'm ready to help—just let me know your Order ID whenever you can!", "seafood_quality_issue_handling.txt": "I am truly sorry if you ever have a concern about quality, and I want you to know that we address these situations with absolute integrity! We assess any potential quality impact through a thorough operational review, checking all handling and temperature logs from the journey. Our company takes responsibility for verified issues and initiates corrective actions immediately to resolve the situation.\n\nWe believe in total accountability, which is why we record every deviation transparently and never try to conceal or deny a problem. Our human oversight team verifies all findings to ensure that our evaluation is factual and fair. By following these systematic procedures, we preserve your trust and ensure that our commitment to safety and quality remains at the center of everything we do!", "company_unique_strengths.txt": "What truly sets us apart is our absolute commitment to operational discipline and transparency! We never make guesses or speculative commitments; every decision we make is backed by verified data and a structured, repeatable process. We prioritize the quality and safety of your shipment over raw volume, ensuring that every cargo gets the attention it deserves.\n\nWe believe that accountability is earned through consistency, which is why we rely on human verification and documented workflows rather than shortcuts. Our communication is always factual, and we never assume a status without proof. It is this blend of rigorous planning, data integrity, and a culture of responsibility that makes us a trusted partner in the logistics industry!", "customer_base_information.txt": "We are honored to serve a diverse group of professional businesses that require high-stakes, reliable transportation! Our primary clients are manufacturers, processing units, and institutional bulk buyers who deal with perishable or time-sensitive goods. These are partners who value consistency, predictable handling, and verified tracking over simple retail delivery.\n\nBecause our operations are designed for business-to-business logistics, we focus on building long-term relationships based on operational compatibility and performance. We make it a point to never overcommit, ensuring that we only take on shipments where we can guarantee our signature level of quality. It’s a privilege to support the industries that keep our economy moving!", "book_shipment_request.txt": "I can certainly help guide you through the booking process! While I can’t generate a booking number directly here in the chat, I can explain exactly how our team will assist you. Once you share your shipment details, our operations experts will review the request for feasibility and contact you to confirm the specifics of the trip.\n\nTo finalize a booking, we require a 35% advance payment, which allows us to lock in your transport and plan the route. The remaining balance is handled at delivery. This human-led verification ensures that every shipment is booked accurately and safely. Our team will be in touch shortly to help you complete your reservation!", "interstate_operations.txt": "We certainly do! Inter-state operations are a cornerstone of our service, and we have developed a core capability in navigating the complexities of crossing state boundaries. This involves meticulous planning for border procedures, compliance documentation, and regional variations in transport regulations to ensure a lawful and smooth journey.\n\nWe don't just assume a route will be easy; we plan operational buffers and verify every corridor for safety before the wheels start turning. Our tracking system is designed to provide visibility across different regions, so you can monitor your shipment as it moves from state to state. We are committed to maintaining the highest standards of inter-state logistics for all our clients!", "order_in_transit_status.txt": "I can certainly check if your order is currently on the move! To give you a verified answer, please provide your Order ID so I can scan our live movement logs. An order is officially considered \"In Transit\" once the dispatch is confirmed and active movement begins between our origin and your destination. I want to make sure I’m giving you the facts rather than just guessing based on how much time has passed.\n\nIf the shipment is moving, I’ll be delighted to confirm that for you instantly. However, if the logs show it is currently stationary at a checkpoint, I’ll report that transparently so you have a realistic view of your shipment’s progress. We value operational accuracy above all else, so please share that ID whenever you’re ready so we can verify the status together!", "order_issue_check.txt": "I’m truly sorry if you’re having trouble with the tracking tool; I’m here to help you figure out why! Please provide your Order ID so I can diagnose the issue. Often, tracking may appear \"broken\" simply because the dispatch is still pending or there is a temporary sync delay between our transport logs and the display.\n\nRest assured that a tracking error doesn't mean there's a problem with the shipment itself—it's usually just a matter of the data being updated in our system. Once you provide the ID, I can see if there’s a confirmed technical glitch or if the records are just in a pending state. Thank you for your patience while we get this sorted out for you!", "temperature_deviation_handling.txt": "If a temperature change is detected, our monitoring systems capture the deviation immediately so that our operational teams can take action! We never ignore a fluctuation; every change is logged internally and reviewed to assess the potential impact on the quality of your seafood. This allows us to evaluate the implications and initiate any necessary corrective actions to protect your shipment.\n\nWe believe in total transparency, so we ensure that every response to a temperature deviation follows our strict internal procedures and is fully documented. No assumptions are made regarding the safety of the cargo until a thorough review is completed. By prioritizing visibility and human oversight, we ensure that our response to temperature issues is fast, accurate, and always focused on maintaining the integrity of your order!", "place_new_order.txt": "It’s wonderful to hear you're interested in working with us! To get things started, our operations team will need to review your request to ensure we have the capacity and handling requirements for your specific shipment. Once you submit your interest, one of our friendly staff members will reach out to you directly to confirm all the details.\n\nAs part of our standard booking process, we do request a 35% advance payment to allocate resources and ensure a smooth dispatch, with the remaining balance due upon delivery. Once everything is validated, you’ll receive your tracking details typically within 36 hours of the order leaving our facility. We can’t wait to help you with your transport needs!", "fleet_size_information.txt": "We manage a fleet size that is carefully balanced with our operational capacity to ensure we can always meet our commitments! While we don't disclose exact fleet numbers publicly, we have a diverse range of vehicle sizes available to handle everything from local city deliveries to long-haul inter-state transport. Our focus is always on deployment readiness and ensuring we never overcommit our resources.\n\nEach truck usage is planned per shipment, and we use a combination of maintenance and human oversight to ensure that every vehicle is available and compliant with safety standards. By scaling our capacity with demand and monitoring fleet utilization, we maintain a high level of operational integrity. This disciplined approach is what allows us to provide a reliable and consistent service for every client!", "spoilage_prevention_measures.txt": "Preventing spoilage is our top operational priority, and we achieve this through a combination of technology and disciplined handling! Our strategy relies on rigid temperature management and carefully planned transit durations that minimize any time your goods spend on the road. We use specialized vehicles and optimized route planning to ensure that freshness is preserved and that exposure to external heat is kept to an absolute minimum.\n\nOur system is designed to detect any deviations instantly, allowing our human oversight team to step in and ensure discipline is maintained. We avoid making speculative promises and instead focus on monitored spoilage indicators and standardized processes that have been refined through years of operational learning. By maintaining this level of transparency and accountability, we significantly reduce the risk of loss and protect the safety of your cargo!", "shipment_audit_process.txt": "Yes, our shipments are subject to regular audits as part of our commitment to compliance and quality! These audits involve a detailed review of our operational records and monitoring data to ensure that every process is being followed correctly. We maintain clear audit trails so that our human oversight team can evaluate our adherence to standards.\n\nWe never avoid audits; instead, we use the findings to guide improvements and address any compliance gaps. This process helps us maintain our operational discipline and ensures that we are always providing the highest level of safety and integrity. By being open to these reviews, we reinforce our accountability and ensure that our service remains consistently reliable!", "order_tracking_not_working.txt": "I’m truly sorry if you’re having trouble with the tracking tool; I’m here to help you figure out why! Please provide your Order ID so I can diagnose the issue. Often, tracking may appear \"broken\" simply because the dispatch is still pending or there is a temporary sync delay between our transport logs and the display.\n\nRest assured that a tracking error doesn't mean there's a problem with the shipment itself—it's usually just a matter of the data being updated in our system. Once you provide the ID, I can see if there’s a confirmed technical glitch or if the records are just in a pending state. Thank you for your patience while we get this sorted out for you!", "truck_types_overview.txt": "We utilize a diverse fleet of refrigerated transport vehicles that are carefully selected to match the specific needs of your shipment! Our trucks come in different sizes to handle varying cargo volumes—ranging from small vans for short-distance local deliveries to medium trucks for inter-city routes and large vehicles for long-haul transport. Every single one of them is equipped for high-precision temperature control.\n\nOur operational planning ensures that the right vehicle is assigned to the right job, taking into account safety, compliance, and feasibility. We follow food-grade standards for all our trucks and maintain them rigorously to ensure they are always ready for service. By assigning the most suitable truck for your cargo, we prioritize quality preservation and ensure that your delivery is handled with absolute consistency!", "order_delivery_confirmation.txt": "I would be so happy to confirm your delivery for you! To check the final status, please share your Order ID so I can access the handover records. An order is only marked as \"Delivered\" in our system once we have a verified receipt confirmation and physical handover logs. This ensures that we never prematurely mark a journey as complete.\n\nIf the delivery is still pending, I will show you exactly which stage it’s in to prevent any confusion. I'm sorry I can't look this up without the ID, but it’s the only way to protect your data and provide a secure, factual confirmation. Once you provide the ID, I'll check the delivery logs immediately—thank you for your cooperation!", "missing_data_guidance.txt": "If you notice that some data is missing, it’s usually because that specific update is still pending confirmation! Our system is designed not to fabricate any information, so it will show a gap until the data is verified. I recommend double-checking your Order ID to make sure it's correct and trying again in a little while.\n\nI'm sorry for the confusion, but please know that no data is ever actually lost during these pending states. If the issue persists, our official support channels are always ready to assist you further. We prioritize accuracy over speed to ensure total transparency—thank you for your patience as we finalize your shipment records!", "tracking_information_unavailable.txt": "I am sorry for the frustration if you're not seeing your tracking details yet, but this usually just means the data is still being finalized! Tracking only becomes available once the dispatch is officially confirmed and the logs are synced. If your order hasn't left our facility yet, the tracking info will not appear in our system to avoid giving you any incorrect or misleading updates.\n\nWe prioritize accuracy over speed, so we don't use placeholder data; we only show you what has been verified. I recommend checking back in a little while once the operational readiness is complete. Please have your Order ID ready so I can evaluate the status for you whenever you're ready. Thank you for your patience while we ensure your data is perfect!", "real_time_truck_tracking.txt": "Tracking for our trucks is available where the operational setup has been specifically configured for it! This tracking data is a vital tool for our team, providing shipment visibility and supporting our overall operational awareness. While we don't assume continuous tracking on every single route, we provide updates based on verified data to keep you informed.\n\nWe are always transparent about our data availability and will never show speculative tracking if the live feed is unavailable. This honesty is central to our commitment to accountability and data integrity. By using logs to record movement and prioritizing accuracy, we ensure that the visibility we provide is reliable and helps maintain the high level of trust you place in our logistics!", "food_safety_compliance_process.txt": "We ensure absolute food safety compliance through a series of highly structured and disciplined processes! This begins with handling procedures that follow defined national standards and temperature controls that are enforced without exception. We use regular monitoring and operational checks to verify that every stage of the shipment is meeting our strict safety rules.\n\nOur human oversight team reviews all compliance data and maintains documentation to support audits and verify that our transport hygiene is perfect. We log any deviations transparently and take immediate corrective action to protect consumers. By prioritizing food safety as our main goal, we maintain a level of integrity and reliability that defines our service!", "destination_city_arrival.txt": "Reaching the destination city is such a huge milestone, and I’d love to verify that for you! To see if your package has arrived at its final local hub, please provide your Order ID. Our system updates this status only after a physical scan at a delivery checkpoint, as we never want to make assumptions based on estimated travel durations.\n\nI am sorry if the arrival data hasn't popped up yet, but I’ll check the latest operational logs to see exactly where the shipment stands. If it hasn't reached the city, I will show you the current transit stage instead so you can see how close it is. We prioritize accuracy to help you plan your day, so please share that ID to get the latest confirmed update!", "refrigerated_truck_explanation.txt": "A refrigerated truck, often called a \"reefer,\" is a specialized vehicle designed specifically to maintain a stable, controlled temperature during transit! These trucks are absolutely essential for transporting perishable goods like seafood because they have active cooling systems that run continuously. This prevents spoilage and ensures that your items stay within their safe temperature range from the warehouse to your door.\n\nWe assign these vehicles with great care, and our monitoring systems ensure that the cooling performance is meeting our strict standards. Our human oversight team verifies these conditions regularly to support food safety and quality preservation. Because these trucks are core assets to our cold chain, we follow mandatory maintenance and compliance checks to ensure they remain reliable for every shipment!", "track_order_using_order_id.txt": "Thank you for providing that Order ID; I have successfully received it!\nI am now using this reference to pull data from our tracking system.\n\nEach ID is uniquely mapped to our dispatch and transport logs.\nI am currently identifying the exact stage your shipment has reached.\nThis includes checking if it is processing, in-transit, or delivered.\nMy response is generated strictly from confirmed operational data.\nI will never show you estimated or artificial updates for your package.\nThis ensures complete transparency so you know exactly what we know.\nEvery timestamp is perfectly aligned with our internal system records.\nI am processing the final details and will display your info momentarily!", "shipment_on_schedule_status.txt": "I’m excited to check if your shipment’s journey has officially begun! In our system, the \"start\" of an order is marked by the initiation of dispatch, and I’ll need your Order ID to verify those logs. We never want to tell you an order has started prematurely, so we wait for the physical dispatch confirmation before updating this milestone.\n\nIf your order is still in the pending stage, I will let you know honestly so you have an accurate picture of the timeline. This ensures that when I tell you it has started, you can be certain the transport process is truly underway. Please provide your ID, and I’ll check the dispatch records for you right now!", "operational_locations.txt": "We are proud to provide extensive logistics coverage across multiple regions and states within India! Our core capability lies in managing complex inter-state movements, where we carefully plan routes to account for regional conditions, border compliance, and safety. We evaluate every shipment route individually to ensure it meets our rigorous feasibility standards.\n\nI want to be transparent and clarify that we focus our expertise specifically within India to maintain the highest quality of service. Whether your shipment needs to travel a long distance or navigate regional constraints, we scale our capacity to meet the challenge while maintaining strict operational boundaries. We are ready to confirm service availability for your specific route as soon as you share your request!", "company_experience_history.txt": "Our company is built on a rock-solid foundation of long-standing operational experience! Over the years, we have refined our processes through countless successful shipments, evolving our knowledge to meet the most demanding industry requirements. We value this maturity because it allows us to make stable, informed decisions that protect your cargo.\n\nWe don't believe in untested shortcuts or experimental practices; instead, we rely on established workflows that have been proven through years of practice. This history of measured, controlled growth is exactly what allows us to offer such high levels of reliability today. When you work with us, you are benefiting from years of accumulated learning and a deep-rooted culture of discipline!", "long_distance_seafood_transport.txt": "Handling long-distance transport requires a high level of meticulous planning and specialized equipment! We select routes that optimize for both time and safety, and we assign large, high-capacity refrigerated trucks that can maintain stable temperatures over many days. To account for the longer journey, we build in transit buffers and maintain continuous visibility through our monitoring systems.\n\nOur operational team logs every mile of progress and performs regular compliance checks to ensure that handling remains consistent throughout the trip. We manage the unique risks of long-haul logistics by being proactive—monitoring for deviations and having corrective actions ready to go if needed. This disciplined approach ensures that your shipment remains safe and that quality is preserved, no matter how far it has to travel!", "order_status_check.txt": "I would love to get you an update on the current status of your order!\nTo provide a definitive answer, I will need your valid Order ID.\nThe \"status\" represents the officially confirmed stage of shipment.\nThis covers everything from warehouse processing to final delivery.\nI generate these updates directly from our internal operational records.\nOur system does not assume progress has been made without verification.\n\nIf your order is in transit, I will display the current route stage.\nAny delays or stoppages will be reported to you with full transparency.\nPlease provide your Order ID so I can fetch this information now.\nWithout that ID, I am unable to access the specific details for you!" };

    const GREET_TRIGGERS = ['hi', 'hello', 'hey', 'how are you', 'how r u', 'how are u',
      'what are you doing', 'wat are u doing', 'good morning', 'good afternoon',
      'good evening', 'sup', 'whats up', "what's up", 'howdy', 'yo', 'greetings'];

    const GREET_REPLIES = [
      "Hey there! 👋 I'm TrackAssist, your 24/7 logistics assistant. I'm doing great and ready to help! Ask me about order tracking, shipments, compliance, cold chain — anything logistics!",
      "Hello! Great to hear from you 😊 All systems are running smoothly on my end. I can help you track shipments, place orders, check compliance, and much more. What do you need today?",
      "Hi! 🚀 I'm TrackAssist — always on duty, always tracking! I can assist with order status, cold chain logistics, FSSAI compliance, fleet info, and more. How can I help?",
      "Hey! 👋 I'm doing well, processing thousands of shipments as we speak! Whether it's order tracking, new bookings, or compliance queries — I've got you covered. What's on your mind?",
    ];

    function isGreeting(txt) {
      const l = txt.toLowerCase().trim();
      return GREET_TRIGGERS.some(g => l === g || l.startsWith(g + ' ') || l.startsWith(g + '!') || l.startsWith(g + ','));
    }
    function greetReply() { return GREET_REPLIES[Math.floor(Math.random() * GREET_REPLIES.length)]; }

    // ── SPECIAL ORDER IDs ──────────────────────────────────────────────
    const SPECIAL_ORDERS = {
      'ahe0719': () => {
        const dispatch = new Date('2026-02-12T15:00:00'); // dispatched 12 Feb 2026 at 3:00 PM
        const totalHrs = 74;
        const eta = new Date(dispatch.getTime() + totalHrs * 60 * 60 * 1000);
        const etaBuf = new Date(eta.getTime() + 2 * 60 * 60 * 1000); // on-or-before = ETA + 2 hrs buffer
        const now = new Date();
        const elapsed = Math.max(0, Math.round((now - dispatch) / (1000 * 60 * 60)));
        const remaining = Math.max(0, totalHrs - elapsed);
        const fmtFull = d => d.toLocaleString('en-IN', {
          weekday: 'long', day: 'numeric', month: 'long',
          year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true
        });
        return (
          `Hi there! 👋 We found your order — here's the full update for Order ID: AHE0719\n\n` +
          `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n` +
          `📦  Route: Chennai  →  Assam\n` +
          `🚛  Vehicle: Fully Refrigerated Reefer Truck\n` +
          `🌡️  Cold Chain: ACTIVE — temperature maintained end-to-end\n` +
          `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n` +
          `🕒  Dispatched: ${fmtFull(dispatch)}\n` +
          `⏱️  Time on road: ${elapsed} hour${elapsed !== 1 ? 's' : ''} and counting\n` +
          `⏳  Remaining: approximately ${remaining} hour${remaining !== 1 ? 's' : ''}\n\n` +
          `📅  Expected Delivery: on or before\n` +
          `     ${fmtFull(etaBuf)}\n\n` +
          `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n` +
          `ℹ️  About your delivery time:\n` +
          `The Chennai → Assam route would normally take 57 hours non-stop. ` +
          `However, we add scheduled rest breaks for our drivers — because their safety and well-being matter to us just as much as your delivery. ` +
          `With these breaks factored in, the total journey time is 74 hours.\n\n` +
          `✅  Don't worry at all — your order is completely ON TIME! 🎯\n\n` +
          `Your cargo is riding in a fully refrigerated truck and has been maintained at the correct cold-chain temperature from the moment it left our facility. ` +
          `It will stay perfectly refrigerated all the way until it reaches your doorstep — freshness and quality are 100% guaranteed. 🐟❄️\n\n` +
          `We appreciate your trust in us. If you have any questions, we're always here! 🚀`
        );
      }
    };
    // ────────────────────────────────────────────────────────────────────

    function findResp(input) {
      // Check special order IDs first (exact match, case-insensitive)
      const trimmed = input.trim().toLowerCase();
      if (SPECIAL_ORDERS[trimmed]) return SPECIAL_ORDERS[trimmed]();
      // Also match if order ID appears anywhere in the message
      for (const [oid, fn] of Object.entries(SPECIAL_ORDERS)) {
        if (input.toLowerCase().includes(oid)) return fn();
      }
      if (isGreeting(input)) return greetReply();
      const low = input.toLowerCase();
      const words = new Set(low.split(/\s+/));
      let best = null, score = 0;
      for (const [kw, file] of Object.entries(KWMAP)) {
        let s = 0;
        if (low.includes(kw)) s = Math.pow(kw.split(' ').length, 2) * 10;
        else {
          const kws = kw.split(' ');
          const ov = kws.filter(w => words.has(w)).length;
          if (ov > 0) { const r = ov / kws.length; if (r >= 0.5) s = ov * r * 5; }
        }
        if (s > score) { score = s; best = file; }
      }
      if (best && RESPS[best]) return RESPS[best];
      return "I'm not quite sure about that. Try asking about:\n📦 Order tracking\n🚢 Shipment status\n🏢 Company services\n🐟 Seafood/cold chain logistics\n🚛 Fleet & trucks\n✅ FSSAI compliance";
    }

    const LS = {
      getHist: () => { try { return JSON.parse(localStorage.getItem('ta_hist') || '[]'); } catch { return []; } },
      setHist: (h) => { try { localStorage.setItem('ta_hist', JSON.stringify(h)); } catch { } },
      getSet: () => { try { return JSON.parse(localStorage.getItem('ta_set') || '{}'); } catch { return {}; } },
      setSet: (s) => { try { localStorage.setItem('ta_set', JSON.stringify(s)); } catch { } },
    };

    function App() {
      const [view, setView] = useState('chat');
      const [msgs, setMsgs] = useState([]);
      const [inp, setInp] = useState('');
      const [typing, setTyping] = useState(false);
      const [started, setStarted] = useState(false);
      const [hist, setHist] = useState(LS.getHist);
      const [settings, setSettings] = useState(() => ({ dark: true, ...LS.getSet() }));
      const [hDetail, setHDetail] = useState(null);
      const endRef = useRef(null);
      const taRef = useRef(null);

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs, typing]);
      useEffect(() => { LS.setSet(settings); }, [settings]);
      useEffect(() => { LS.setHist(hist); }, [hist]);

      const now = () => new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const addBot = (text) => setMsgs(p => [...p, { r: 'bot', text, t: now() }]);

      const send = () => {
        const txt = inp.trim(); if (!txt) return;
        if (!started) setStarted(true);
        const um = { r: 'user', text: txt, t: now() };
        setMsgs(p => [...p, um]);
        setInp('');
        if (taRef.current) { taRef.current.style.height = 'auto'; }
        setTyping(true);
        setTimeout(() => {
          const resp = findResp(txt);
          const bm = { r: 'bot', text: resp, t: now() };
          setMsgs(p => [...p, bm]);
          setHist(h => {
            const e = { id: Date.now(), q: txt, a: resp, ts: new Date().toLocaleString(), msgs: [um, bm] };
            return [e, ...h].slice(0, 60);
          });
          setTyping(false);
        }, 700 + Math.random() * 500);
      };

      const onKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

      // sendDirect: avoids stale-closure bug when chips/cards set state then call send()
      const sendDirect = (txt) => {
        if (!txt.trim()) return;
        if (!started) setStarted(true);
        const um = { r: 'user', text: txt.trim(), t: now() };
        setMsgs(p => [...p, um]);
        setInp('');
        if (taRef.current) { taRef.current.style.height = 'auto'; }
        setTyping(true);
        setTimeout(() => {
          const resp = findResp(txt.trim());
          const bm = { r: 'bot', text: resp, t: now() };
          setMsgs(p => [...p, bm]);
          setHist(h => {
            const e = { id: Date.now(), q: txt.trim(), a: resp, ts: new Date().toLocaleString(), msgs: [um, bm] };
            return [e, ...h].slice(0, 60);
          });
          setTyping(false);
        }, 700 + Math.random() * 500);
      };;
      const clearChat = () => { setMsgs([]); setStarted(false); };
      const toggle = (k) => setSettings(s => ({ ...s, [k]: !s[k] }));

      const chips = ['Track my order', 'Order status', 'Place new order', 'FSSAI compliance', 'Seafood transport', 'Cold chain'];
      const actions = [
        { icon: '📦', lbl: 'Track Shipment', dsc: 'Real-time tracking', q: 'Track my order' },
        { icon: '💬', lbl: 'Get Quote', dsc: 'Pricing & estimates', q: 'How to place order' },
        { icon: '🛡️', lbl: 'Compliance', dsc: 'FSSAI & regulations', q: 'FSSAI compliance' },
        { icon: '🌡️', lbl: 'Cold Chain', dsc: 'Temperature logistics', q: 'Cold chain logistics' },
      ];

      return (
        <div className={"app" + (settings.dark ? '' : ' light')}>
          {/* SIDEBAR */}
          <aside className="sb">
            <div className="sb-logo" onClick={() => setView('chat')}>
              <img src={LOGO} alt="logo" />
            </div>
            <NB icon="💬" tip="Chat" on={view === 'chat'} onClick={() => setView('chat')} />
            <NB icon="📊" tip="Analytics" on={view === 'analytics'} onClick={() => setView('analytics')} />
            <NB icon="⚙️" tip="Settings" on={view === 'settings'} onClick={() => setView('settings')} />
            <div className="sp" />
            <NB icon="🗑️" tip="Clear Chat" onClick={clearChat} />
            <NB icon="⏻" tip="Log Out" red onClick={() => alert('Logged out!')} />
          </aside>

          {/* MAIN */}
          <div className="main">
            <div className="sweep" />

            {/* HEADER */}
            <header className="hdr">
              <div className="hdr-l">
                <img className="hdr-logo" src={LOGO} alt="logo" />
                <div>
                  <div className="hdr-name">TrackAssist</div>
                  <div className="hdr-sub">AI Chatbot</div>
                </div>
              </div>
              <div className="hdr-r">
                <div className="badge">Active Shipments: <b>43</b></div>
                {view === 'chat' && <button className="clr-btn" onClick={clearChat}>Clear Chat</button>}
                <button className="back-btn" onClick={() => { window.close(); window.location.href = 'http://localhost:1995'; }} title="Back to Customer Portal">
                  &#8592; Back
                </button>
              </div>
            </header>

            {/* ── CHAT VIEW ── */}
            {view === 'chat' && (
              <div className="view">
                {!started ? (
                  <div className="welcome">
                    <div className="globe-wrap">
                      <div className="globe-ring"><img src={LOGO} alt="TrackAssist" style={{ width: '72px', height: '72px', objectFit: 'cover', borderRadius: '50%' }} /></div>
                      <div className="globe-dot" />
                    </div>
                    <div className="ws">Active Shipments: <b>43</b></div>
                    <div className="wt">Welcome to TrackAssist</div>
                    <div className="wd">AI-powered logistics assistant. Track orders, manage shipments, and get instant compliance answers.</div>
                    <div className="agrid">
                      {actions.map((a, i) => (
                        <div key={i} className="acard" onClick={() => sendDirect(a.q)}>
                          <div className="aicon">{a.icon}</div>
                          <div><div className="albl">{a.lbl}</div><div className="adsc">{a.dsc}</div></div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div className="chat-scroll">
                    {msgs.map((m, i) => (
                      <div key={i} className={"msg " + m.r}>
                        <div className="av">
                          {m.r === 'bot'
                            ? <img src={LOGO} alt="bot" />
                            : <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28"><circle cx="18" cy="18" r="18" fill="#1a2e42" /><circle cx="18" cy="14" r="6" fill="#3a6080" /><path d="M6 30c0-6.627 5.373-12 12-12s12 5.373 12 12" fill="#3a6080" /></svg>
                          }
                        </div>
                        <div className="bbl-wrap">
                          <div className="bbl">{m.text}</div>
                          <div className="mt">{m.t}</div>
                        </div>
                      </div>
                    ))}
                    {typing && (
                      <div className="typing">
                        <div className="av"><img src={LOGO} alt="bot" /></div>
                        <div className="typing-bbl">
                          <div className="td" /><div className="td" /><div className="td" />
                        </div>
                      </div>
                    )}
                    <div ref={endRef} />
                  </div>
                )}
                <div className="chips">
                  {chips.map((c, i) => (
                    <div key={i} className="chip"
                      onClick={() => sendDirect(c)}>
                      {c}
                    </div>
                  ))}
                </div>
                <div className="ibar">
                  <div className="iwrap">
                    <textarea ref={taRef} className="inp" rows="1"
                      placeholder="Type your question or tracking number..."
                      value={inp}
                      onChange={e => { setInp(e.target.value); e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 130) + 'px'; }}
                      onKeyDown={onKey} />
                    <button className="sbtn" onClick={send}>
                      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ── ANALYTICS / HISTORY VIEW ── */}
            {view === 'analytics' && (
              <div className="panel">
                <div className="ptitle">Chat History</div>
                {hDetail ? (
                  <>
                    <button className="hbk" onClick={() => setHDetail(null)}>← Back</button>
                    <div style={{ fontSize: 11, color: 'var(--txt3)', marginBottom: 14, fontFamily: 'Rajdhani', letterSpacing: 1 }}>{hDetail.ts}</div>
                    <div className="hd-box">
                      {hDetail.msgs.map((m, i) => (
                        <div key={i} className="hd-msg">
                          <div className="hd-who">{m.r === 'user' ? 'You' : 'TrackAssist'}</div>
                          <div className="hd-text">{m.text}</div>
                        </div>
                      ))}
                    </div>
                  </>
                ) : hist.length === 0 ? (
                  <div className="empty">
                    <div className="empty-i">📭</div>
                    <div>No chat history yet</div>
                    <div style={{ fontSize: 11, marginTop: 6, color: 'var(--txt3)' }}>Start chatting to see history here</div>
                  </div>
                ) : (
                  <>
                    {hist.map(h => (
                      <div key={h.id} className="hi" onClick={() => setHDetail(h)}>
                        <button className="hi-del" onClick={e => { e.stopPropagation(); setHist(p => p.filter(x => x.id !== h.id)) }}>Delete</button>
                        <div className="hi-q">{h.q}</div>
                        <div className="hi-meta">{h.ts}</div>
                        <div className="hi-prev">{h.a}</div>
                      </div>
                    ))}
                    <button className="logout-btn" style={{ marginTop: 16 }} onClick={() => { if (window.confirm('Delete all history?')) { setHist([]); LS.setHist([]); } }}>
                      🗑️ &nbsp;Delete All History
                    </button>
                  </>
                )}
              </div>
            )}

            {/* ── SETTINGS VIEW ── */}
            {view === 'settings' && (
              <div className="panel">
                <div className="ptitle">Settings</div>

                <div className="sgrp">
                  <div className="sgrp-lbl">Appearance</div>
                  <div className="srow">
                    <div>
                      <div className="srow-lbl">Dark Theme</div>
                      <div className="srow-sub">Toggle dark / light mode</div>
                    </div>
                    <button className={"tog" + (settings.dark ? ' on' : '')} onClick={() => toggle('dark')} />
                  </div>
                </div>

                <div className="sgrp">
                  <div className="sgrp-lbl">Chat Management</div>
                  <div className="srow">
                    <div>
                      <div className="srow-lbl">Clear Current Chat</div>
                      <div className="srow-sub">Remove all messages in active session</div>
                    </div>
                    <button className="act-btn cl" onClick={() => { clearChat(); }}>Clear</button>
                  </div>
                  <div className="srow">
                    <div>
                      <div className="srow-lbl">Delete All History</div>
                      <div className="srow-sub">Permanently remove all previous conversations</div>
                    </div>
                    <button className="act-btn cl" onClick={() => { if (window.confirm('Delete all history?')) { setHist([]); LS.setHist([]); } }}>Delete All</button>
                  </div>
                </div>

                <div className="sgrp">
                  <div className="sgrp-lbl">Account</div>
                  <button className="logout-btn" onClick={() => alert('Logged out!')}>⏻ &nbsp;Log Out</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function NB({ icon, tip, on, onClick, red }) {
      return (
        <button className={"nb" + (on ? ' on' : '') + (red ? ' red' : '')} onClick={onClick}>
          {icon}<span className="tip">{tip}</span>
        </button>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>

</html>
